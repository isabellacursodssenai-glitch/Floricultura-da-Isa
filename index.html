<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floricultura - Presenteie com Amor</title>
    <link rel="stylesheet" href="style.css">
    <!-- Importando uma fonte elegante do Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <h1>Presenteie com flores o amor da sua vida!</h1>
    </header>

    <main class="container">
        <!-- Seção de Produtos -->
        <section class="flower-grid" id="products-grid">
            <!-- Card 1 -->
            <div class="card">
                <img src="https://i.pinimg.com/1200x/0b/04/c7/0b04c75706da1bdc012fbfdae80bf9c0.jpg" alt="Buquê de Rosas Vermelhas">
                <div class="card-info">
                    <h3>Buquê de Rosas</h3>
                    <p class="price">R$ 130,00</p>
                    <button class="add-to-cart">Adicionar ao Carrinho</button>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="card">
                <img src="https://i.pinimg.com/736x/d1/1e/ba/d11eba27ab677a8a922627296ed6cf33.jpg" alt="Tulipas Coloridas">
                <div class="card-info">
                    <h3>Tulipas Vibrantes</h3>
                    <p class="price">R$ 125,00</p>
                    <button class="add-to-cart">Adicionar ao Carrinho</button>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="card">
                <img src="https://i.pinimg.com/736x/87/39/94/873994558467e061963649f14b3407ed.jpg" alt="Lírios Brancos">
                <div class="card-info">
                    <h3>Lírios da Paz</h3>
                    <p class="price">R$ 110,00</p>
                    <button class="add-to-cart">Adicionar ao Carrinho</button>
                </div>
            </div>

            <!-- Card 4 -->
            <div class="card">
                <img src="https://i.pinimg.com/736x/73/53/a0/7353a0a316b47578ccc38a7267fdc48a.jpg" alt="Girassóis Solares">
                <div class="card-info">
                    <h3>Girassóis Alegres</h3>
                    <p class="price">R$ 120,00</p>
                    <button class="add-to-cart">Adicionar ao Carrinho</button>
                </div>
            </div>

            <!-- Card 5 -->
            <div class="card">
                <img src="https://i.pinimg.com/736x/50/cb/ca/50cbca2f0604c329682d62bf4fb108ad.jpg" alt="Orquídea Phalaenopsis">
                <div class="card-info">
                    <h3>Orquídea Rara</h3>
                    <p class="price">R$ 119,99</p>
                    <button class="add-to-cart">Adicionar ao Carrinho</button>
                </div>
            </div>

            <!-- Card 6 -->
            <div class="card">
                <img src="https://i.pinimg.com/736x/44/b5/9d/44b59d462d5749fdd9452c8c745a46fa.jpg" alt="Rosas azuis">
                <div class="card-info">
                    <h3>Rosas azuis </h3>
                    <p class="price">R$ 120,00</p>
                    <button class="add-to-cart">Adicionar ao Carrinho</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p><strong>Isabella de Oliveira</strong></p>
            <p>📞 62-99363-9877</p>
            <p>📸 Instagram: <a href="https://instagram.com/Bella_wzs05" target="_blank">@Bella_wzs05</a></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
